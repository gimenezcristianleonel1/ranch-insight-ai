<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Sin conexión — GanaderIA</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1rem; padding: 2rem;
        text-align: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #245e33; color: #f7f6ee;
      }
      img { width: 96px; height: 96px; }
      h1 { font-size: 1.4rem; margin: 0; }
      p { margin: 0; max-width: 28rem; opacity: 0.85; line-height: 1.5; }
      button {
        margin-top: 0.5rem; padding: 0.7rem 1.4rem; border: 0; border-radius: 9999px;
        background: #f7f6ee; color: #245e33; font-weight: 600; font-size: 1rem; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <img src="/icon.svg" alt="GanaderIA" />
    <h1>Sin conexión</h1>
    <p>No hay conexión a internet en este momento. Revisá tu señal y volvé a intentar; tus datos se sincronizan cuando vuelve la conexión.</p>
    <button onclick="location.reload()">Reintentar</button>
  </body>
</html>
